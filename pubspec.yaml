name: tar_news
description: TAR News - Aplikasi Berita Cross Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView
  webview_flutter: ^4.10.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Supabase
  supabase_flutter: ^2.5.6

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  flutter_html: ^3.0.0-beta.2

  # Image Picker
  image_picker: ^1.1.2

  # Utils
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.6
  intl: ^0.19.0

  # Scraper / HTML Parser
  http: ^1.2.1
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true